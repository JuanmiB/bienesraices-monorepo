[build]
  base = "."
  command = "npm run build:frontend"
  publish = "apps/frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
